<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light">
<title>大工計算</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
:root {
  color-scheme: light;
  --bg:#F2F2F7; --s1:#FFFFFF; --s2:#F2F2F7; --s3:#E5E5EA;
  --lbl:#1c1c1e; --lbl2:#636366; --lbl3:#aeaeb2;
  --acc:#E8530A; --acc-s:rgba(232,83,10,.12);
  --r:13px; --rlg:18px;
  --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
}
*,*::before,*::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
html,body {
  height:100dvh; overflow:hidden; background:var(--bg); color:var(--lbl);
  font-family:var(--font); -webkit-font-smoothing:antialiased;
  user-select:none; -webkit-user-select:none;
}

/* ── 全体レイアウト ── */
#app {
  height:100dvh;
  display:flex;
  flex-direction:column;
  padding-top: max(env(safe-area-inset-top), 52px);
  padding-left: 12px;
  padding-right: 12px;
  padding-bottom: max(env(safe-area-inset-bottom), 8px);
  gap:8px;
}

/* ── タブ ── */
.tabs { display:flex; background:var(--s3); border-radius:var(--r); padding:3px; gap:2px; flex-shrink:0; }
.tab  { flex:1; padding:22px 0; font-size:16px; font-weight:600; color:var(--lbl2); background:transparent; border:none; border-radius:10px; cursor:pointer; transition:background .2s,color .2s; }
.tab.on { background:#fff; color:var(--lbl); box-shadow:0 1px 4px rgba(0,0,0,.12); }
.tab:active { transform:scale(0.97); }

/* ── ステータス ── */
.status { text-align:center; font-size:12px; color:var(--lbl3); flex-shrink:0; height:16px; line-height:16px; }
.hi { color:var(--acc); font-weight:700; }

/* ── 三角形エリア（flex:1 で余白を全部使う） ── */
.tri-box {
  flex:1;
  min-height:0;
  max-height:22vh;
  background:var(--s1);
  border-radius:var(--rlg);
  overflow:hidden;
  padding:12px;
}
.tri-box svg { width:100%; height:100%; display:block; }

/* SVG 辺 */
.tl  { fill:none; stroke:#aeaeb2; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; transition:stroke .2s,stroke-width .2s; }
.tl.on { stroke:var(--acc); stroke-width:2.5; }
.rsq { fill:none; stroke:#c7c7cc; stroke-width:1.2; }

/* SVG テキスト（大きめ） */
.svl    { font-family:var(--mono); font-size:20px; fill:#636366; }
.svl.on { fill:var(--acc); font-weight:700; }

/* ── セルグリッド（2列×2行） ── */
.grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; flex-shrink:0; }

.cell { background:var(--s1); border-radius:var(--r); padding:14px 16px; border:1.5px solid var(--s3); cursor:pointer; transition:border-color .15s,background .15s; }
.cell.on { border-color:var(--acc); background:#FFF8F5; }
.cell.ro { cursor:default; border-color:var(--s3); background:var(--s1); }

.ck { font-size:22px; color:var(--lbl3); font-weight:600; margin-bottom:6px; }
.cell.on .ck { color:var(--acc); }

.cv { font-family:var(--mono); font-size:38px; font-weight:500; color:var(--lbl); min-height:42px; }
.cv.empty { color:var(--lbl3); font-size:30px; }

/* ── リセット ── */
.rst-row { text-align:center; flex-shrink:0; }
.rst { background:transparent; border:none; color:var(--acc); font-size:15px; font-weight:500; padding:4px 20px; border-radius:10px; cursor:pointer; font-family:var(--font); }
.rst:active { background:var(--acc-s); }

/* ── キーパッド ── */
.kpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; flex-shrink:0; }
.kb { height:124px; background:var(--s1); border:none; border-radius:var(--r); color:var(--lbl); font-family:var(--mono); font-size:32px; cursor:pointer; transition:background .1s,transform .08s; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(0,0,0,.1); }
.kb:active { background:var(--s3); transform:scale(0.95); }
.kb.del { color:var(--acc); font-size:20px; }
.kb.del:active { background:var(--acc-s); }
</style>
</head>
<body>
<div id="app">

  <!-- タブ -->
  <div class="tabs">
    <button class="tab on" id="tb0" onclick="setTab(0)">① 斜辺・角度</button>
    <button class="tab"    id="tb1" onclick="setTab(1)">② 勾配・高さ</button>
  </div>

  <!-- ステータス -->
  <div class="status"><span class="hi" id="sti">水平 a</span> を入力中</div>

  <!-- 三角形 SVG -->
  <div class="tri-box">
    <svg viewBox="0 0 320 260" preserveAspectRatio="none">
      <line id="la" class="tl on" x1="24" y1="234" x2="296" y2="234"/><!-- 水平a/H -->
      <line id="lv" class="tl"    x1="296" y1="234" x2="296" y2="26"/> <!-- 垂直b -->
      <line id="lh" class="tl"    x1="24"  y1="234" x2="296" y2="26"/> <!-- 斜辺 -->
      <polyline class="rsq" points="280,234 280,218 296,218"/>
      <text id="tA" class="svl" x="290" y="18"  text-anchor="end">角A —°</text>
      <text id="tB" class="svl" x="28"  y="252">角B —°</text>
      <text id="tH" class="svl" x="152" y="118" text-anchor="middle" transform="rotate(-35 152 118)">斜辺 —</text>
      <text id="ta" class="svl on" x="160" y="252" text-anchor="middle">水平 a</text>
      <text id="tv" class="svl"   x="310" y="130" text-anchor="middle" transform="rotate(-90 310 130)">垂直 b</text>
    </svg>
  </div>

  <!-- 4セルグリッド（入力2 + 結果2） -->
  <div class="grid">
    <div class="cell on" id="ca" onclick="setF(0)">
      <div class="ck" id="ca-k">水平 a</div>
      <div class="cv empty" id="ca-v">—</div>
    </div>
    <div class="cell" id="cb" onclick="setF(1)">
      <div class="ck" id="cb-k">垂直 b</div>
      <div class="cv empty" id="cb-v">—</div>
    </div>
    <div class="cell ro">
      <div class="ck" id="rk0">斜辺（筋交い）</div>
      <div class="cv empty" id="rv0">—</div>
    </div>
    <div class="cell ro">
      <div class="ck" id="rk1">勾配</div>
      <div class="cv empty" id="rv1">—</div>
    </div>
  </div>

  <!-- リセット -->
  <div class="rst-row"><button class="rst" onclick="doReset()">リセット</button></div>

  <!-- キーパッド -->
  <div class="kpad">
    <button class="kb" onclick="kp('7')">7</button>
    <button class="kb" onclick="kp('8')">8</button>
    <button class="kb" onclick="kp('9')">9</button>
    <button class="kb" onclick="kp('4')">4</button>
    <button class="kb" onclick="kp('5')">5</button>
    <button class="kb" onclick="kp('6')">6</button>
    <button class="kb" onclick="kp('1')">1</button>
    <button class="kb" onclick="kp('2')">2</button>
    <button class="kb" onclick="kp('3')">3</button>
    <button class="kb" onclick="kp('0')">0</button>
    <button class="kb" onclick="kp('.')">.</button>
    <button class="kb del" onclick="kp('⌫')">⌫</button>
  </div>

</div>

<script>
// ── 状態 ──
const S = { tab:0, a:'', b:'', slope:'', slopeFrom:'none', slope2:'', H:'' };
let ai = 0; // activeIndex: 0=左セル, 1=右セル

const g = id => document.getElementById(id);

// ── mm整形 ──
function mm(v) {
  const n = Math.round(v);
  return n >= 1000 ? (n/1000).toFixed(3).replace(/\.?0+$/,'')+'m' : n+'mm';
}

// ── 計算 ──
function calc() {
  const a=parseFloat(S.a)||0, b=parseFloat(S.b)||0;
  const sl=parseFloat(S.slope)||0, sl2=parseFloat(S.slope2)||0, H=parseFloat(S.H)||0;

  // 画面1
  const fs2 = S.slopeFrom==='manual' && !S.a && sl>0;
  const ca=fs2?1000:a, cb=fs2?1000*(sl/10):b;
  const hypo  = (ca>0&&cb>0) ? Math.sqrt(ca*ca+cb*cb) : null;
  const angA  = (ca>0&&cb>0) ? Math.atan2(cb,ca)*180/Math.PI : null;
  const angB  = angA!==null ? 90-angA : null;
  const slopeR= (ca>0&&cb>0) ? cb/ca*10 : null;

  // 画面2
  const roofH  = (H>0&&sl2>0) ? H*(sl2/10) : null;
  const rafter = roofH!==null ? Math.sqrt(H*H+roofH*roofH) : null;
  const angA2  = (H>0&&roofH!==null) ? Math.atan2(roofH,H)*180/Math.PI : null;
  const angB2  = angA2!==null ? 90-angA2 : null;

  return {fs2,ca,cb,hypo,angA,angB,slopeR,roofH,rafter,angA2,angB2};
}

// ── 入力フィールド名取得 ──
function fld() { return S.tab===0 ? (ai===0?'a':'b') : (ai===0?'slope2':'H'); }

// ── キー入力 ──
function kp(k) {
  const f=fld(); let v=S[f]||'';
  if (k==='⌫') v=v.slice(0,-1);
  else if (k==='.') { if(!v.includes('.')) v+='.'; }
  else v+=k;
  S[f]=v;
  if ((f==='a'||f==='b') && S.slopeFrom!=='manual') {
    const r=calc();
    if (r.slopeR!==null) { S.slope=r.slopeR.toFixed(2); S.slopeFrom='screen1'; }
  }
  render();
}

function setF(i)  { ai=i; render(); }
function setTab(t){ S.tab=t; ai=0; render(); }
function doReset(){ S.a='';S.b='';S.slope='';S.slopeFrom='none';S.slope2='';S.H=''; ai=0; render(); }

// ── SVG辺ハイライト ──
function hl(aOn,vOn,hOn) {
  ['la','lv','lh'].forEach((id,i)=>{
    g(id).classList.toggle('on',[aOn,vOn,hOn][i]);
  });
}

// ── SVGテキスト ──
function st(id,txt,on) { const e=g(id); e.textContent=txt; e.classList.toggle('on',on); }

// ── セル値 ──
function sc(id,txt) {
  const e=g(id), empty=!txt;
  e.textContent=empty?'—':txt;
  e.classList.toggle('empty',empty);
}

// ── 描画 ──
function render() {
  const r=calc(), f=fld();
  g('tb0').classList.toggle('on',S.tab===0);
  g('tb1').classList.toggle('on',S.tab===1);
  g('sti').textContent={a:'水平 a',b:'垂直 b',slope2:'勾配',H:'水平 H'}[f];

  if (S.tab===0) {
    g('ca-k').textContent='水平 a'; g('cb-k').textContent='垂直 b';
    g('ca').classList.toggle('on',ai===0); g('cb').classList.toggle('on',ai===1);
    sc('ca-v', (!S.a&&r.fs2)?'1000mm':(S.a?S.a+'mm':''));
    sc('cb-v', (!S.b&&r.fs2)?mm(r.cb):(S.b?S.b+'mm':''));
    g('rk0').textContent='斜辺（筋交い）'; g('rk1').textContent='勾配';
    sc('rv0', r.hypo!==null?mm(r.hypo):'');
    sc('rv1', r.slopeR!==null?r.slopeR.toFixed(2)+'寸':'');
    hl(ai===0, ai===1, false);
    st('tA', r.angA!==null?'角A '+r.angA.toFixed(1)+'°':'角A —°', false);
    st('tB', r.angB!==null?'角B '+r.angB.toFixed(1)+'°':'角B —°', false);
    st('tH', r.hypo!==null?'斜辺 '+mm(r.hypo):'斜辺 —', r.hypo!==null);
    st('ta', S.a?S.a+'mm':'水平 a', ai===0);
    st('tv', S.b?S.b+'mm':'垂直 b', ai===1);

  } else {
    g('ca-k').textContent='勾配'; g('cb-k').textContent='水平 H';
    g('ca').classList.toggle('on',ai===0); g('cb').classList.toggle('on',ai===1);
    sc('ca-v', S.slope2?S.slope2+'寸':'');
    sc('cb-v', S.H?S.H+'mm':'');
    g('rk0').textContent='屋根高さ'; g('rk1').textContent='斜辺（垂木長さ）';
    sc('rv0', r.roofH!==null?mm(r.roofH):'');
    sc('rv1', r.rafter!==null?mm(r.rafter):'');
    hl(ai===1, false, ai===0);
    st('tA', r.angA2!==null?'角A '+r.angA2.toFixed(1)+'°':'角A —°', false);
    st('tB', r.angB2!==null?'角B '+r.angB2.toFixed(1)+'°':'角B —°', false);
    st('tH', r.rafter!==null?'斜辺 '+mm(r.rafter):'斜辺 —', r.rafter!==null);
    st('ta', S.H?S.H+'mm':'水平 H', ai===1);
    st('tv', r.roofH!==null?mm(r.roofH):'屋根高さ', r.roofH!==null);
  }
}

render();
</script>
</body>
</html>
