<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>大工計算</title>
<link rel="apple-touch-icon" href="icon.png">
<style>
:root {
  --bg:        #000;
  --s1:        #1c1c1e;
  --s2:        #2c2c2e;
  --s3:        #3a3a3c;
  --lbl:       #fff;
  --lbl2:      rgba(235,235,245,.60);
  --lbl3:      rgba(235,235,245,.30);
  --acc:       #FF9F0A;
  --acc-s:     rgba(255,159,10,.15);
  --r-lg:      18px;
  --r-md:      13px;
  --font:      -apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  --mono:      ui-monospace,"SF Mono",Menlo,monospace;
}
*,*::before,*::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }

html,body { height:100dvh; overflow:hidden; background:var(--bg); color:var(--lbl); font-family:var(--font); -webkit-font-smoothing:antialiased; user-select:none; -webkit-user-select:none; }

#app { height:100dvh; display:flex; flex-direction:column; padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }

/* ── タブ ── */
.tabs { display:flex; margin:10px 16px 6px; padding:3px; background:var(--s1); border-radius:var(--r-md); gap:2px; flex-shrink:0; }
.tab  { flex:1; padding:9px 0; font-size:13px; font-weight:600; color:var(--lbl2); background:transparent; border:none; border-radius:11px; cursor:pointer; transition:background .2s,color .2s; }
.tab.on { background:var(--s3); color:var(--lbl); box-shadow:0 2px 6px rgba(0,0,0,.3); }

/* ── ステータス ── */
.status { text-align:center; font-size:11px; letter-spacing:.05em; color:var(--lbl3); height:18px; line-height:18px; margin-bottom:6px; flex-shrink:0; }
.hi { color:var(--acc); font-weight:700; }

/* ── 三角形SVGエリア ── */
.tri-box { height:210px; flex-shrink:0; margin:0 16px; background:var(--s1); border-radius:var(--r-lg); overflow:hidden; }
.tri-box svg { width:100%; height:100%; display:block; }

.tl { fill:none; stroke:var(--lbl3); stroke-width:1.2; stroke-linecap:round; stroke-linejoin:round; transition:stroke .2s,stroke-width .2s; }
.tl.hi { stroke:var(--acc); stroke-width:2.2; }
.rsq { fill:none; stroke:var(--lbl3); stroke-width:1; }

.svl { font-family:var(--mono); font-size:11px; fill:var(--lbl2); }
.svl.hi { fill:var(--acc); font-weight:700; }
.svv { font-family:var(--mono); font-size:12px; font-weight:600; fill:var(--acc); }

/* ── セルグリッド（2列×2行） ── */
.grid { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto auto; gap:8px; margin:8px 16px 0; flex-shrink:0; }

.cell { background:var(--s1); border-radius:var(--r-md); padding:8px 12px; border:1.5px solid transparent; cursor:pointer; min-height:52px; transition:border-color .15s,background .15s; }
.cell.on { border-color:var(--acc); background:var(--s2); }
.cell.ro { cursor:default; }

.ck { font-size:10px; letter-spacing:.05em; color:var(--lbl3); font-weight:600; margin-bottom:3px; }
.cell.on .ck { color:var(--acc); }

.cv { font-family:var(--mono); font-size:18px; font-weight:500; color:var(--lbl); min-height:22px; }
.cv.empty { color:var(--lbl3); font-size:14px; }

/* ── リセット ── */
.reset-row { text-align:center; margin:4px 0; flex-shrink:0; }
.rst { background:transparent; border:none; color:var(--acc); font-size:15px; font-weight:500; padding:5px 20px; border-radius:10px; cursor:pointer; font-family:var(--font); }
.rst:active { background:var(--acc-s); }

/* ── キーパッド ── */
.kpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:0 16px 10px; flex-shrink:0; }
.kb { height:54px; background:var(--s2); border:none; border-radius:var(--r-md); color:var(--lbl); font-family:var(--mono); font-size:28px; cursor:pointer; transition:background .1s,transform .08s; display:flex; align-items:center; justify-content:center; }
.kb:active { background:var(--s3); transform:scale(0.95); }
.kb.del { color:var(--acc); font-size:22px; }
.kb.del:active { background:var(--acc-s); }
</style>
</head>
<body>
<div id="app">

  <!-- タブ -->
  <div class="tabs">
    <button class="tab on" id="tb0" onclick="setTab(0)">① 斜辺・角度</button>
    <button class="tab"    id="tb1" onclick="setTab(1)">② 勾配・高さ</button>
  </div>

  <!-- ステータス -->
  <div class="status"><span class="hi" id="sti">水平 a</span> を入力中</div>

  <!-- 三角形 -->
  <div class="tri-box">
    <svg viewBox="0 0 320 210" preserveAspectRatio="xMidYMid meet">
      <line id="la" class="tl hi" x1="26" y1="186" x2="294" y2="186"/><!-- 水平a / H -->
      <line id="lv" class="tl"    x1="294" y1="186" x2="294" y2="24"/> <!-- 垂直b -->
      <line id="lh" class="tl"    x1="26"  y1="186" x2="294" y2="24"/> <!-- 斜辺 -->
      <polyline class="rsq" points="280,186 280,172 294,172"/>
      <!-- ラベル（SVGテキスト） -->
      <text id="tA" class="svl" x="290" y="16" text-anchor="end">角A —°</text>
      <text id="tB" class="svl" x="30"  y="204">角B —°</text>
      <text id="tH" class="svl" x="148" y="98"  text-anchor="middle" transform="rotate(-34 148 98)">斜辺 —</text>
      <text id="ta" class="svl hi" x="160" y="204" text-anchor="middle">水平 a</text>
      <text id="tv" class="svl"   x="308" y="108" text-anchor="middle" transform="rotate(-90 308 108)">垂直 b</text>
    </svg>
  </div>

  <!-- 4セルグリッド（入力2 + 結果2） -->
  <div class="grid" id="cells">
    <!-- 入力セル -->
    <div class="cell on" id="ca" onclick="setF('f0')">
      <div class="ck" id="ca-k">水平 a</div>
      <div class="cv empty" id="ca-v">—</div>
    </div>
    <div class="cell" id="cb" onclick="setF('f1')">
      <div class="ck" id="cb-k">垂直 b</div>
      <div class="cv empty" id="cb-v">—</div>
    </div>
    <!-- 結果セル -->
    <div class="cell ro">
      <div class="ck" id="rk0">斜辺（筋交い）</div>
      <div class="cv empty" id="rv0">—</div>
    </div>
    <div class="cell ro">
      <div class="ck" id="rk1">勾配</div>
      <div class="cv empty" id="rv1">—</div>
    </div>
  </div>

  <!-- リセット -->
  <div class="reset-row"><button class="rst" onclick="doReset()">リセット</button></div>

  <!-- キーパッド -->
  <div class="kpad">
    <button class="kb" onclick="kp('7')">7</button>
    <button class="kb" onclick="kp('8')">8</button>
    <button class="kb" onclick="kp('9')">9</button>
    <button class="kb" onclick="kp('4')">4</button>
    <button class="kb" onclick="kp('5')">5</button>
    <button class="kb" onclick="kp('6')">6</button>
    <button class="kb" onclick="kp('1')">1</button>
    <button class="kb" onclick="kp('2')">2</button>
    <button class="kb" onclick="kp('3')">3</button>
    <button class="kb" onclick="kp('0')">0</button>
    <button class="kb" onclick="kp('.')">.</button>
    <button class="kb del" onclick="kp('⌫')">⌫</button>
  </div>

</div>

<script>
// ── 状態 ──
const S = {
  tab: 0,
  // 画面1
  a:'', b:'', slope:'', slopeFrom:'none',
  // 画面2
  slope2:'', H:'',
};

// tab=0: f0=a, f1=b
// tab=1: f0=slope2, f1=H
let activeIdx = 0; // 0 or 1

const g = id => document.getElementById(id);

// ── フォーマット ──
function mm(v) {
  const n = Math.round(v);
  return n >= 1000 ? (n/1000).toFixed(3).replace(/\.?0+$/,'')+'m' : n+'mm';
}

// ── 計算 ──
function calc() {
  const a  = parseFloat(S.a)  || 0;
  const b  = parseFloat(S.b)  || 0;
  const sl = parseFloat(S.slope) || 0;
  const sl2 = parseFloat(S.slope2) || 0;
  const H  = parseFloat(S.H)  || 0;

  // 画面1: a,b → 斜辺,角度,勾配
  const fromS2 = S.slopeFrom==='manual' && !S.a && sl>0;
  const ca = fromS2 ? 1000 : a;
  const cb = fromS2 ? 1000*(sl/10) : b;
  const hypo  = (ca>0&&cb>0) ? Math.sqrt(ca*ca+cb*cb) : null;
  const angA  = (ca>0&&cb>0) ? Math.atan2(cb,ca)*180/Math.PI : null;
  const angB  = angA!==null ? 90-angA : null;
  const slopeR= (ca>0&&cb>0) ? cb/ca*10 : null;

  // 画面2: slope2,H → 屋根高さ,垂木
  const roofH  = (H>0&&sl2>0) ? H*(sl2/10) : null;
  const rafter = roofH!==null ? Math.sqrt(H*H+roofH*roofH) : null;
  const angA2  = (H>0&&roofH!==null) ? Math.atan2(roofH,H)*180/Math.PI : null;
  const angB2  = angA2!==null ? 90-angA2 : null;

  return { fromS2, ca, cb, hypo, angA, angB, slopeR, roofH, rafter, angA2, angB2 };
}

// ── フィールドキー取得 ──
function curField() {
  if (S.tab===0) return activeIdx===0 ? 'a' : 'b';
  return activeIdx===0 ? 'slope2' : 'H';
}

// ── キー入力 ──
function kp(k) {
  const f = curField();
  let v = S[f]||'';
  if (k==='⌫')     v = v.slice(0,-1);
  else if (k==='.') { if (!v.includes('.')) v+='.'; }
  else v += k;
  S[f] = v;

  if (f==='a'||f==='b') {
    if (S.slopeFrom!=='manual') {
      const r = calc();
      if (r.slopeR!==null) { S.slope=r.slopeR.toFixed(2); S.slopeFrom='screen1'; }
    }
  }
  render();
}

function setF(which) {
  activeIdx = (which==='f0') ? 0 : 1;
  render();
}

function setTab(t) {
  S.tab = t; activeIdx = 0;
  render();
}

function doReset() {
  S.a=''; S.b=''; S.slope=''; S.slopeFrom='none'; S.slope2=''; S.H='';
  activeIdx=0; render();
}

// ── 辺ハイライト ──
function hilite(aOn, vOn, hOn) {
  const tog = (id, on) => {
    const el = g(id);
    el.classList.toggle('hi', on);
  };
  tog('la',aOn); tog('lv',vOn); tog('lh',hOn);
}

// ── SVGテキスト ──
function svt(id, txt, hi) {
  const el = g(id);
  el.textContent = txt;
  el.classList.toggle('hi', hi);
}

// ── セル表示 ──
function showCell(id, txt, hi) {
  const el = g(id);
  const isEmpty = !txt;
  el.textContent = isEmpty ? '—' : txt;
  el.classList.toggle('empty', isEmpty);
  el.classList.toggle('hi', !isEmpty && hi);
}

// ── 描画 ──
function render() {
  const r = calc();
  const f = curField();

  // タブ
  g('tb0').classList.toggle('on', S.tab===0);
  g('tb1').classList.toggle('on', S.tab===1);

  // ステータス
  const nm = {a:'水平 a', b:'垂直 b', slope2:'勾配', H:'水平 H'};
  g('sti').textContent = nm[f];

  if (S.tab===0) {
    // ── 入力セル ──
    g('ca-k').textContent='水平 a';
    g('cb-k').textContent='垂直 b';
    g('ca').classList.toggle('on', activeIdx===0);
    g('cb').classList.toggle('on', activeIdx===1);

    const aT = (!S.a&&r.fromS2)?'1000mm':(S.a?S.a+'mm':'');
    const bT = (!S.b&&r.fromS2)?mm(r.cb):(S.b?S.b+'mm':'');
    showCell('ca-v', aT, false);
    showCell('cb-v', bT, false);

    // ── 結果セル ──
    g('rk0').textContent='斜辺（筋交い）';
    g('rk1').textContent='勾配';
    showCell('rv0', r.hypo!==null ? mm(r.hypo) : '', true);
    showCell('rv1', r.slopeR!==null ? r.slopeR.toFixed(2)+'寸' : '', true);

    // ── SVG ──
    hilite(activeIdx===0, activeIdx===1, false);
    svt('tA', r.angA!==null ? '角A '+r.angA.toFixed(1)+'°' : '角A —°', false);
    svt('tB', r.angB!==null ? '角B '+r.angB.toFixed(1)+'°' : '角B —°', false);
    svt('tH', r.hypo!==null ? '斜辺 '+mm(r.hypo) : '斜辺 —', r.hypo!==null);
    svt('ta', S.a?S.a+'mm':'水平 a', activeIdx===0);
    svt('tv', S.b?S.b+'mm':'垂直 b', activeIdx===1);
    g('tv').setAttribute('opacity','1');

  } else {
    // ── 入力セル ──
    g('ca-k').textContent='勾配';
    g('cb-k').textContent='水平 H';
    g('ca').classList.toggle('on', activeIdx===0);
    g('cb').classList.toggle('on', activeIdx===1);

    showCell('ca-v', S.slope2?S.slope2+'寸':'', false);
    showCell('cb-v', S.H?S.H+'mm':'', false);

    // ── 結果セル ──
    g('rk0').textContent='屋根高さ';
    g('rk1').textContent='斜辺（垂木長さ）';
    showCell('rv0', r.roofH!==null ? mm(r.roofH) : '', true);
    showCell('rv1', r.rafter!==null ? mm(r.rafter) : '', true);

    // ── SVG ──
    hilite(activeIdx===1, false, activeIdx===0);
    svt('tA', r.angA2!==null ? '角A '+r.angA2.toFixed(1)+'°' : '角A —°', false);
    svt('tB', r.angB2!==null ? '角B '+r.angB2.toFixed(1)+'°' : '角B —°', false);
    svt('tH', r.rafter!==null ? '斜辺 '+mm(r.rafter) : '斜辺 —', r.rafter!==null);
    svt('ta', S.H?S.H+'mm':'水平 H', activeIdx===1);
    const hH = r.roofH!==null ? mm(r.roofH) : '屋根高さ';
    svt('tv', hH, r.roofH!==null);
    g('tv').setAttribute('opacity','1');
  }
}

render();
</script>
</body>
</html>
